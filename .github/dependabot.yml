# Dependabot must live at .github/dependabot.yml (not under workflows/)
# for GitHub to detect it.
version: 2
updates:
  # Weekly npm dependency audit.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      # Bundle minor/patch updates into a single PR to reduce noise.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Keep GitHub Actions pinned versions fresh.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "ci"
