<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Synapse Wealth — Directions Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&amp;family=Cormorant+Garamond:wght@500;600&amp;display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="lib/design-canvas.jsx"></script>
<script type="text/babel" src="directions/tokens.jsx"></script>
<script type="text/babel" src="directions/direction-a.jsx"></script>
<script type="text/babel" src="directions/direction-b.jsx"></script>
<script type="text/babel" src="directions/direction-c.jsx"></script>
<script type="text/babel" src="directions/shell-a.jsx"></script>
<script type="text/babel" src="directions/view-immo.jsx"></script>
<script type="text/babel" src="directions/view-portfolio.jsx"></script>
<script type="text/babel" src="directions/view-debt.jsx"></script>
<script type="text/babel" src="directions/view-imports.jsx"></script>
<script type="text/babel" src="directions/view-asset.jsx"></script>
<script type="text/babel" src="directions/mobile-a.jsx"></script>
<script type="text/babel" src="directions/mobile-b.jsx"></script>
<script type="text/babel" src="directions/mobile-c.jsx"></script>
<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <DCSection id="directions" title="Dashboard global patrimoine — 3 directions" subtitle="Groupe FDL · Famille de Launay · données fictives · 84,2 M€ bruts / 27,8 M€ de dette / 56,4 M€ nets">
        <DCArtboard id="dir-a" label="A · Héritage Synapse — dark, fidèle à l'existant" width={1440} height={1060}>
          <DirectionA />
        </DCArtboard>
        <DCArtboard id="dir-b" label="B · Clair institutionnel — nav horizontale, aéré" width={1440} height={1010}>
          <DirectionB />
        </DCArtboard>
        <DCArtboard id="dir-b-dark" label="B · Variante dark — même layout, tokens sombres" width={1440} height={1010}>
          <DirectionB dark={true} />
        </DCArtboard>
        <DCArtboard id="dir-c" label="C · Cockpit décisionnel — risque & dette au premier plan" width={1440} height={940}>
          <DirectionC />
        </DCArtboard>
      </DCSection>
      <DCSection id="screens" title="Écrans — Direction A (Héritage Synapse)" subtitle="Mêmes données Groupe FDL · à confirmer comme direction retenue">
        <DCArtboard id="view-immo" label="Immobilier — 5 biens, valeur vs dette, maturités, table détaillée" width={1440} height={1040}>
          <ViewImmo />
        </DCArtboard>
        <DCArtboard id="view-portfolio" label="Portefeuille titres — actions / ETF / obligations, groupé, look-through" width={1440} height={1020}>
          <ViewPortfolio />
        </DCArtboard>
        <DCArtboard id="view-debt" label="Dette & Levier — module Lombard, stress tests, covenants, 8 crédits" width={1440} height={1160}>
          <ViewDebt />
        </DCArtboard>
        <DCArtboard id="view-imports" label="Imports & réconciliation — importé vs recalculé, anomalies, rollback" width={1440} height={1010}>
          <ViewImports />
        </DCArtboard>
        <DCArtboard id="view-asset" label="Fiche actif — drawer NVIDIA : lots, nantissement, fiscalité, timeline, documents" width={1440} height={1020}>
          <ViewAssetDrawer />
        </DCArtboard>
      </DCSection>
      <DCSection id="mobile" title="Mobile — 390 px" subtitle="Une déclinaison par direction, dans le même ordre que desktop">
        <DCArtboard id="mob-a" label="A · Héritage Synapse — mobile" width={390} height={844}>
          <MobileA />
        </DCArtboard>
        <DCArtboard id="mob-b" label="B · Clair institutionnel — mobile" width={390} height={844}>
          <MobileB />
        </DCArtboard>
        <DCArtboard id="mob-b-dark" label="B · Variante dark — mobile" width={390} height={844}>
          <MobileB dark={true} />
        </DCArtboard>
        <DCArtboard id="mob-c" label="C · Cockpit décisionnel — mobile" width={390} height={844}>
          <MobileC />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
